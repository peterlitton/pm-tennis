<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Live tennis</title>
<!-- Step 3.7: inline SVG favicon — self-contained tennis ball with embedded
     gradient (can't reference the page-level <defs> gradient because the
     favicon renders in isolation). Mirrors the canonical TENNIS_BALL SVG
     in dashboard.js so the browser tab brand matches the dashboard. Modern
     browsers (Chrome, Firefox, Safari, Edge) all support inline SVG favicons. -->
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><defs><radialGradient id="g" cx="0.35" cy="0.3"><stop offset="0%25" stop-color="%23F0F88B"/><stop offset="100%25" stop-color="%23B5D33D"/></radialGradient></defs><circle cx="24" cy="24" r="22" fill="url(%23g)"/><path d="M 4 10 C 16 22, 32 22, 44 10" stroke="white" stroke-width="2.5" fill="none" opacity="0.9"/><path d="M 4 38 C 16 26, 32 26, 44 38" stroke="white" stroke-width="2.5" fill="none" opacity="0.9"/></svg>' />
<link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <radialGradient id="tennisBallGradient" cx="0.35" cy="0.3">
      <stop offset="0%" stop-color="#F0F88B"/>
      <stop offset="100%" stop-color="#B5D33D"/>
    </radialGradient>
  </defs>
</svg>

<div class="dashboard">

  <div class="header">
    <div class="header-left">
      <span class="title">Live tennis</span>
      <span id="live-count" class="badge-live">0 live</span>
      <span id="upcoming-count" class="upcoming-count"></span>
    </div>
    <div class="header-right">
      <div class="health">
        <span id="api-tennis-dot" class="dot dot-unknown"></span>
        <span class="health-label">API-Tennis</span>
        <span id="api-tennis-age" class="health-age">—</span>
      </div>
      <div class="health">
        <span id="polymarket-dot" class="dot dot-unknown"></span>
        <span class="health-label">Polymarket</span>
        <span id="polymarket-age" class="health-age">—</span>
      </div>
      <!-- v0.6.11: uptime badge. Process uptime since last start. Subtle
           when normal (just a small grey number); a glance after stepping
           away surfaces "uptime 4m" → process restarted recently → if
           that wasn't a deploy, the WS watchdog auto-restarted, check logs.
           Combined with the WS watchdog (auto-restart on N consecutive
           failures), the badge is the operator-awareness layer over silent
           recovery events. -->
      <div class="uptime" title="Process uptime since last restart">
        <span class="uptime-label">uptime</span>
        <span id="uptime-value" class="uptime-value">—</span>
      </div>
      <div id="clock" class="clock">--:--:-- --</div>
    </div>
  </div>

  <div class="grid-header">
    <div>Status</div>
    <div>Match</div>
    <div class="ta-c">Sets</div>
    <div class="ta-c">Game</div>
    <div class="ta-r">Price</div>
  </div>

  <div id="rows"></div>

  <!-- Indicator legend (v0.6.10).
       Operator-facing reference for the conditions driving each
       indicator on the dashboard. Collapsible so it doesn't clutter
       glance-scanning during live trading; expandable when the
       operator wants to confirm "what does +5 momentum mean today" or
       wants to direct a parameter tune.

       Each line: indicator name + version + key parameters. Momentum
       additionally surfaces its MI.X parameter-set version with the
       full bundle so operator can reference exact parameters by name
       when directing tuning. Content is rendered by dashboard.js from
       the snapshot's momentum_indicator block — single source of truth,
       backend-driven, never out of sync with what's actually live. -->
  <details id="legend" class="legend">
    <summary class="legend-summary">Indicator legend</summary>
    <div id="legend-body" class="legend-body">
      <!-- populated by dashboard.js from snapshot.momentum_indicator -->
    </div>
  </details>

  <!-- Step 5: footer with version + Sackmann attribution.
       Step 5.1: split into three sections.
       - Version (left)
       - Rankings freshness (center) — refreshed weekly via data/refresh_rankings.py
       - Elo freshness (right) — Step S Sackmann snapshot, end-of-2024 until Option B fires
       Two distinct dates honestly signal what's fresh vs stale. -->
  <div class="footer">
    <span class="footer-left">v0.6.13</span>
    <span class="footer-center">Rankings: May '26</span>
    <span class="footer-right">Elo: Dec '24</span>
  </div>

</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
